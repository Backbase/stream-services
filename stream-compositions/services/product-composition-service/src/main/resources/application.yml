spring:
  application:
    name: product-composition
  main:
    allow-bean-definition-overriding: true
    web-application-type: reactive
sso:
  jwt:
    internal:
      type: signed
      signature:
        algorithm: HS256
        key:
          type: ENV
          value: SIG_SECRET_KEY
backbase:
  communication:
    http:
      default-service-port: 8080
  mtls:
    enabled: false
  security:
    http:
      enabled: true
  stream:
    compositions:
      product:
        chains:
          transaction-composition:
            enabled: true
            async: false
            excludeProductTypeExternalIds:
          payment-order-composition:
            enabled: true
            async: false
            excludeProductTypeExternalIds:
        events:
          enableCompleted: true
          enableFailed: true
        cursor:
          enabled: false
        ingestion-mode:
          function-groups: UPSERT
          data-groups: UPSERT
          arrangements: UPSERT
  api:
    extensions:
      classes:
        com.backbase.dbs.arrangement.api.service.v3.model.ArrangementPutItem: additional-acc-data
      property-sets:
        additional-acc-data:
          properties:
            - property-name: templateType
              type: string
            - property-name: overdraftProtection
              type: boolean
logging:
  level:
    com.backbase.dbs: DEBUG
    com.backbase.buildingblocks: DEBUG

